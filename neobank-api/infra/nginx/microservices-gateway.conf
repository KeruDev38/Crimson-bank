events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:(3000|4200|5173)$" $http_origin;
        "~^http://127\.0\.0\.1:(3000|4200|5173)$" $http_origin;
    }

    server {
        listen 8080;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Service-Token, Idempotency-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = / {
            default_type application/json;
            return 200 '{"service":"crimson-neobank-api-gateway","status":"UP"}';
        }

        location = /favicon.ico {
            return 204;
        }

        location /api/auth {
            set $identity_upstream http://identity-service:8081;
            proxy_pass $identity_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/accounts {
            set $account_upstream http://account-service:8082;
            proxy_pass $account_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/transactions {
            set $transaction_upstream http://transaction-service:8083;
            proxy_pass $transaction_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/compliance {
            set $compliance_upstream http://compliance-service:8084;
            proxy_pass $compliance_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
