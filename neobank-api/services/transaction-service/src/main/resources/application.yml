spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transactions}
    username: ${DB_USERNAME:transaction_user}
    password: ${DB_PASSWORD:transaction_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:identityLocalDevSecretKeyThatIsAtLeast32Chars}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:localInternalServiceTokenThatIsAtLeast32Chars}

services:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
