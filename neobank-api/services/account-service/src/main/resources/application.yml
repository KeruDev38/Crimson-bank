spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:accounts}
    username: ${DB_USERNAME:account_user}
    password: ${DB_PASSWORD:account_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:identityLocalDevSecretKeyThatIsAtLeast32Chars}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:localInternalServiceTokenThatIsAtLeast32Chars}
