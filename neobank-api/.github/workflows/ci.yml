name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crimson_bank
          POSTGRES_USER: crimson_user
          POSTGRES_PASSWORD: crimson_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crimson_user -d crimson_bank"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: crimson_bank
      DB_USERNAME: crimson_user
      DB_PASSWORD: crimson_password
      JWT_SECRET: crimsonBankCiSecretKeyThatIsAtLeast32CharactersLong

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test
        run: mvn -B -ntp test

      - name: Package
        run: mvn -B -ntp package -DskipTests

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: neobank-api-jar
          path: target/*.jar
          if-no-files-found: error

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - test
      - identity-test
      - account-test
      - transaction-test
      - compliance-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: neobank-api:ci

      - name: Build identity service image
        uses: docker/build-push-action@v6
        with:
          context: services/identity-service
          push: false
          tags: identity-service:ci

      - name: Build account service image
        uses: docker/build-push-action@v6
        with:
          context: services/account-service
          push: false
          tags: account-service:ci

      - name: Build transaction service image
        uses: docker/build-push-action@v6
        with:
          context: services/transaction-service
          push: false
          tags: transaction-service:ci

      - name: Build compliance service image
        uses: docker/build-push-action@v6
        with:
          context: services/compliance-service
          push: false
          tags: compliance-service:ci

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Publish identity service image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/identity-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-identity-service:latest
            ghcr.io/${{ github.repository }}-identity-service:${{ github.sha }}

      - name: Publish account service image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/account-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-account-service:latest
            ghcr.io/${{ github.repository }}-account-service:${{ github.sha }}

      - name: Publish transaction service image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/transaction-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-transaction-service:latest
            ghcr.io/${{ github.repository }}-transaction-service:${{ github.sha }}

      - name: Publish compliance service image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/compliance-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-compliance-service:latest
            ghcr.io/${{ github.repository }}-compliance-service:${{ github.sha }}

  identity-test:
    name: Identity Service Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: identity
          POSTGRES_USER: identity_user
          POSTGRES_PASSWORD: identity_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U identity_user -d identity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: identity
      DB_USERNAME: identity_user
      DB_PASSWORD: identity_password
      JWT_SECRET: identityCiSecretKeyThatIsAtLeast32CharactersLong

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test identity service
        working-directory: services/identity-service
        run: mvn -B -ntp test

  account-test:
    name: Account Service Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: accounts
          POSTGRES_USER: account_user
          POSTGRES_PASSWORD: account_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U account_user -d accounts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: accounts
      DB_USERNAME: account_user
      DB_PASSWORD: account_password
      JWT_SECRET: identityCiSecretKeyThatIsAtLeast32CharactersLong

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test account service
        working-directory: services/account-service
        run: mvn -B -ntp test

  transaction-test:
    name: Transaction Service Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: transactions
          POSTGRES_USER: transaction_user
          POSTGRES_PASSWORD: transaction_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transaction_user -d transactions"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: transactions
      DB_USERNAME: transaction_user
      DB_PASSWORD: transaction_password
      JWT_SECRET: identityCiSecretKeyThatIsAtLeast32CharactersLong
      INTERNAL_SERVICE_TOKEN: ciInternalServiceTokenThatIsAtLeast32Chars
      ACCOUNT_SERVICE_URL: http://localhost:8082

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test transaction service
        working-directory: services/transaction-service
        run: mvn -B -ntp test

  compliance-test:
    name: Compliance Service Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: compliance
          POSTGRES_USER: compliance_user
          POSTGRES_PASSWORD: compliance_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U compliance_user -d compliance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: compliance
      DB_USERNAME: compliance_user
      DB_PASSWORD: compliance_password
      JWT_SECRET: identityCiSecretKeyThatIsAtLeast32CharactersLong
      INTERNAL_SERVICE_TOKEN: ciInternalServiceTokenThatIsAtLeast32Chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test compliance service
        working-directory: services/compliance-service
        run: mvn -B -ntp test
